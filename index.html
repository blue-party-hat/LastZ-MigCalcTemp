<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Migration Score Calculator</title>
  <style>
    :root{
      --bg0:#0b1020;
      --bg1:#0f1733;
      --border:rgba(255,255,255,0.14);
      --text:rgba(255,255,255,0.92);
      --muted:rgba(255,255,255,0.70);
      --muted2:rgba(255,255,255,0.55);
      --shadow:0 10px 30px rgba(0,0,0,0.35);
      --shadow2:0 18px 60px rgba(0,0,0,0.45);
      --radius2:22px;
      --ring:0 0 0 3px rgba(124,58,237,0.35);
    }

    *{box-sizing:border-box}
    html,body{width:100%;margin:0}

    body{
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 20% 0%,rgba(124,58,237,0.35),transparent 60%),
        radial-gradient(700px 400px at 80% 10%,rgba(34,197,94,0.25),transparent 60%),
        linear-gradient(180deg,var(--bg0),var(--bg1));
      min-height:100vh;
      overflow-x:hidden;
    }

    .wrap{max-width:980px;margin:26px auto 60px;padding:0 16px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
    .brand{display:flex;flex-direction:column;gap:2px;min-width:240px;flex:1 1 240px}
    .brand h1{font-size:20px;margin:0;letter-spacing:.2px}
    .brand p{margin:0;color:var(--muted);font-size:13px;line-height:1.35}

    .tabs{
      display:flex;
      gap:8px;
      padding:6px;
      background:rgba(255,255,255,0.06);
      border:1px solid var(--border);
      border-radius:999px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      flex:0 0 auto;
    }

    .tabbtn{
      border:1px solid transparent;
      background:transparent;
      color:var(--muted);
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      font-weight:700;
      letter-spacing:.2px;
      transition:all .15s;
      white-space:nowrap;
    }

    .tabbtn:hover{color:var(--text);background:rgba(255,255,255,0.06)}
    .tabbtn.active{
      color:#fff;
      background:linear-gradient(135deg,rgba(124,58,237,0.95),rgba(34,197,94,0.75));
      box-shadow:0 8px 20px rgba(124,58,237,0.25);
    }
