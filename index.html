<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Migration Score Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 16px; }
    .tabs { display:flex; gap:8px; margin: 0 0 12px; }
    .tabbtn { border:1px solid #666; background:#111; color:#fff; padding:10px 14px; border-radius:8px; cursor:pointer; }
    .tabbtn.active { background:#2b6cb0; border-color:#2b6cb0; }
    .panel { display:none; }
    .panel.active { display:block; }

    .card { border: 1px solid #ccc; border-radius: 8px; padding: 16px; margin: 12px 0; }
    label { display:block; margin: 10px 0 4px; }
    input { width: 100%; padding: 8px; font-size: 16px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    th { background: #f5f5f5; }
    .muted { color:#555; font-size: 13px; line-height: 1.4; }
  </style>
</head>
<body>

  <div class="tabs" role="tablist" aria-label="Language tabs">
    <button class="tabbtn active" id="tab-en" type="button">English</button>
    <button class="tabbtn" id="tab-ja" type="button">日本語</button>
  </div>

  <!-- EN PANEL -->
  <section class="panel active" id="panel-en">
    <h2>(temp) Migration Score Calculator</h2>
    <p class="muted">
      This is not an official calculator. Enter values below to estimate the score.
    </p>
  </section>

  <!-- JA PANEL -->
  <section class="panel" id="panel-ja">
    <h2>（仮）移行スコア計算</h2>
    <p class="muted">
      ※1 公式計算式ではありません。コミュニティで見つけた計算式を使っています。<br>
      ※2 サーバーのアクティブ率・強さ・人口などの要素により、計算結果が必ず移行スコアにならない可能性があります。
    </p>
  </section>

  <!-- Shared calculator UI (same inputs/outputs for both languages) -->
  <div class="card">
    <h3 id="inputs-title">Enter corresponding numbers</h3>

    <label id="lbl-d12">Structure Power (D12)</label>
    <input id="d12" type="number" step="any" value="0">

    <label id="lbl-d13">Tech Power (D13)</label>
    <input id="d13" type="number" step="any" value="0">

    <label id="lbl-d14">Hero Power (D14)</label>
    <input id="d14" type="number" step="any" value="0">

    <label id="lbl-d15">Mod Vehicle Power (D15)</label>
    <input id="d15" type="number" step="any" value="0">
  </div>

  <div class="card">
    <h3 id="score-title">Score prediction</h3>
    <table>
      <thead>
